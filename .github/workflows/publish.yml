name: publish

# Fires on `v*` tag push (per protocols/versioning-protocol.md §5). Builds the package,
# runs verify.ts (which re-checks all version-alignment invariants), and publishes to
# the npm registry. Also creates a GitHub Release referencing the CHANGELOG entry.
#
# The /release slash command pushes the tag; this workflow handles the rest.
#
# Required repo secrets:
#   NPM_TOKEN — npm automation token with publish scope on @tapintomymind/tap-agents
#
# This workflow runs ONLY on tag push, not on branch push. Direct pushes to main do
# not trigger a publish — the tag is the contract.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # for creating the GitHub Release
  id-token: write   # for npm provenance (--provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org/"
          cache: "npm"

      - name: Upgrade npm for Trusted Publishing
        # Node LTS runners ship with npm 10.x. Trusted Publishing (OIDC auth)
        # requires npm 11.5.1 or later — without this upgrade, the npm CLI can't
        # mint the OIDC token and the publish step silently falls back to "no
        # auth", which the registry rejects with a confusing 404. Surfaced during
        # the v0.8.3 publish attempt 2026-05-12; v0.9.0 is the first OIDC publish.
        # PINNED to the npm@11 major (NOT @latest): npm@12 raised its engines
        # floor past the runner's Node and broke the v0.37.0 publish with
        # EBADENGINE — an unpinned @latest re-exposes the workflow to every
        # future engines-floor bump. npm@11 satisfies the >=11.5.1 OIDC
        # requirement and tracks 11.x patches only.
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build dist/
        run: npm run build

      - name: Verify build output and version alignment
        run: npm run verify

      - name: Validate tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION). Refusing to publish."
            exit 1
          fi
          echo "Tag and package versions aligned at $PKG_VERSION."

      - name: Validate tagged commit is an ancestor of origin/main
        # Layer A of trunk-discipline (workspace/_global/trunk-discipline-tech-strategy-2026-05-19.md;
        # tightened in v0.24.1 per workspace/_global/v0.24.1-layer-a-regex-fix-2026-05-19.md
        # after v0.24.0's self-bypass dogfood incident — see §3 for control-flow rationale).
        #
        # Refuses to publish if the tag was created on a feature branch and main was never
        # back-merged. This is the mechanical floor under the /release Layer B flow + the
        # memory-note discipline (feedback_trunk_must_reflect_published_state.md).
        #
        # The check dereferences the tag to its commit SHA via `git rev-parse
        # "${GITHUB_REF_NAME}^{commit}"` (invariant to lightweight vs annotated tag
        # shape — W2 of Critic 2026-05-19), then `git fetch origin main` (no --depth;
        # the checkout above used fetch-depth: 0 so origin/main is already fully
        # fetched — W3 of Critic) + `git merge-base --is-ancestor`. Fails LOUD (exits
        # non-zero before npm publish) so an orphan-trunk release is impossible by
        # construction.
        #
        # Control flow (v0.24.1+, always-compute-ancestry):
        #   1. Extract override reason (trailer-only) → OVERRIDE_REASON (possibly empty)
        #   2. Run ancestry check → ANCESTRY_PASS (true/false)
        #   3. Branch on joint outcome:
        #        PASS + no override         → silent pass
        #        PASS + override present    → warn "override unused"; pass
        #        FAIL + override present    → warn "override allows publish: <reason>"; pass
        #        FAIL + no override         → hard error (existing block with remediation)
        # Override is no longer an early-exit "skip" — it's a "skip-failure-on-known-reason."
        # The ancestry check ALWAYS runs. Prose false-positives surface as info warnings.
        #
        # Override token: `[trunk-discipline-override: <reason>]`. Recognized ONLY in the
        # commit message's TRAILER BLOCK (the lines after the last blank line in the
        # message, mirroring git's Co-authored-by convention). Prose mentions in the body
        # do not match — they get treated as documentation. Reason must be non-empty after
        # whitespace strip; placeholder words ("reason", "todo", "...") and angle brackets
        # are rejected.
        run: |
          set -euo pipefail

          # Dereference the tag to its target commit SHA. Works for both annotated
          # (`git tag -a`) and lightweight tags. Bare ${GITHUB_SHA} is mostly correct
          # under push:tags events but has sharp edges for lightweight tags; this
          # form is invariant to tag shape.
          TAG_SHA=$(git rev-parse "${GITHUB_REF_NAME}^{commit}")
          TAG_NAME="${GITHUB_REF_NAME}"
          echo "Tagged commit: ${TAG_SHA} (${TAG_NAME})"

          # Fetch origin/main fresh. The checkout step above used fetch-depth: 0 so the
          # repo is already unshallow; do NOT pass --depth here (re-shallowing an
          # unshallow checkout is silently ignored on most git versions and warns on
          # recent ones — W3).
          git fetch origin main

          MAIN_SHA=$(git rev-parse origin/main)
          echo "origin/main HEAD: ${MAIN_SHA}"

          # --- Step 1: extract trailer-only override (v0.24.1+) -------------------
          COMMIT_MSG=$(git log -1 --format=%B "${TAG_SHA}")

          # Find the index of the LAST blank line in the message. Trailer block lives
          # after that line. If there are no blank lines at all, the trailer candidate
          # is the last line only (covers one-line tag-messages with an override).
          LAST_BLANK_LINE=$(echo "${COMMIT_MSG}" | awk 'BEGIN{lc=0; lastblank=0} {lc++; if($0=="") lastblank=lc} END{print lastblank}')

          if [ "${LAST_BLANK_LINE}" -gt 0 ]; then
            TRAILER_BLOCK=$(echo "${COMMIT_MSG}" | tail -n +$((LAST_BLANK_LINE + 1)))
          else
            TRAILER_BLOCK=$(echo "${COMMIT_MSG}" | tail -n 1)
          fi

          # Match the override token ONLY in the trailer block. Pattern restrictions:
          #   - Whole-line anchored (^...$): mid-line prose doesn't match.
          #   - Leading/trailing whitespace tolerated.
          #   - Reason character class [^]<>] forbids angle brackets in the reason
          #     so placeholder forms like "<reason>" are rejected at the regex level.
          #   - Reason must be non-empty after the +.
          OVERRIDE_MATCH=$(echo "${TRAILER_BLOCK}" | grep -E '^[[:space:]]*\[trunk-discipline-override:[[:space:]]*[^]<>]+\][[:space:]]*$' | head -1 || true)

          OVERRIDE_REASON=""
          if [ -n "${OVERRIDE_MATCH}" ]; then
            OVERRIDE_REASON=$(echo "${OVERRIDE_MATCH}" \
              | sed -E 's/^[[:space:]]*\[trunk-discipline-override:[[:space:]]*//; s/\][[:space:]]*$//' \
              | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')

            # Defense-in-depth — reject bare placeholder words even if they slipped past
            # the regex (the [^]<>] class already blocks "<reason>" but case-folded
            # "reason"/"TODO"/"..." should also be denied).
            REASON_LOWER=$(echo "${OVERRIDE_REASON}" | tr '[:upper:]' '[:lower:]')
            case "${REASON_LOWER}" in
              reason|todo|...)
                echo "::warning::Override token in trailer block has placeholder reason '${OVERRIDE_REASON}'; treating as absent."
                OVERRIDE_REASON=""
                ;;
            esac
          fi

          # --- Step 2: run ancestry check (ALWAYS, regardless of override) ---------
          ANCESTRY_PASS="false"
          if git merge-base --is-ancestor "${TAG_SHA}" "${MAIN_SHA}"; then
            ANCESTRY_PASS="true"
          fi

          # --- Step 3: branch on joint outcome -------------------------------------
          if [ "${ANCESTRY_PASS}" = "true" ] && [ -z "${OVERRIDE_REASON}" ]; then
            echo "PASS — tagged commit ${TAG_SHA} is an ancestor of origin/main (${MAIN_SHA})."
            exit 0
          fi

          if [ "${ANCESTRY_PASS}" = "true" ] && [ -n "${OVERRIDE_REASON}" ]; then
            echo "PASS — tagged commit ${TAG_SHA} is an ancestor of origin/main (${MAIN_SHA})."
            echo "::warning::Override token present but ancestry passed naturally; override unused: ${OVERRIDE_REASON}"
            echo "(If this override was intentional, ancestry passed independently — verify the operator's intent matches the recorded reason.)"
            exit 0
          fi

          if [ "${ANCESTRY_PASS}" = "false" ] && [ -n "${OVERRIDE_REASON}" ]; then
            echo "::warning::Ancestry failed but override allows publish: ${OVERRIDE_REASON}"
            echo "Tagged commit ${TAG_SHA} is NOT an ancestor of origin/main (${MAIN_SHA})."
            echo "Proceeding with publish under operator-issued override. Reason recorded above + visible in gh release view."
            exit 0
          fi

          # ANCESTRY_PASS=false AND no override → hard error.
          # Diagnostic — detect the duplicate-fork pattern where main has tree-identical
          # content under a different SHA. This is the v0.23.0 incident shape: tag
          # anchored to a sibling branch but main HEAD has the same files. Surfaces a
          # distinct hint so the operator picks the right remediation path.
          if git diff --quiet "${TAG_SHA}" "${MAIN_SHA}"; then
            echo "::warning::Duplicate-fork pattern detected — main HEAD has tree-identical content to the tagged commit, but they are different SHAs. See Duplicate-fork remediation below."
          fi

          cat >&2 <<EOF
          ::error::Trunk-discipline violation — refusing to publish ${TAG_NAME}.

          The tagged commit ${TAG_SHA} is NOT an ancestor of origin/main (${MAIN_SHA}).
          This means the release commit lives on a feature branch and main has never been
          back-merged. Publishing now would leave main silently behind the published state —
          the exact failure mode of v0.15.0 (2026-05-13) and v0.23.0 (2026-05-19).

          Remediation (Linear case — branch never merged):
            1. git checkout main && git pull origin main
            2. git merge --no-ff <release-branch>
            3. git push origin main
            4. Re-run this workflow (tag is now an ancestor of main).

          Remediation (Duplicate-fork case — main has content but tag points elsewhere):
            Symptom: \`git diff ${TAG_SHA} ${MAIN_SHA}\` shows no file differences.
            If main contains tree-identical content under a different SHA:
            1. Identify the main-side mirror commit:
                 git log --all --format='%H %s' | grep "<release commit subject>"
            2. Force-move the tag to the main-side SHA:
                 git tag -f ${TAG_NAME} <main-side-SHA>
            3. Update origin:
                 git push origin :${TAG_NAME} && git push origin ${TAG_NAME}
            4. Re-run this workflow.
            NOTE: tag-move is destructive to audit history. Prefer the linear case when possible.
            NOTE: npm packages are immutable — only the tag pointer changes, not the published content.

          Or, if this is a genuine hotfix where back-merge-first is operationally infeasible,
          add the trunk-discipline override token to the release commit message's TRAILER
          BLOCK (last paragraph, after a blank line, alongside Co-authored-by:). Reason must
          be non-empty after whitespace strip and must not be a placeholder ("reason", "todo",
          "...", or anything with angle brackets). See commands/release.md for the exact
          token shape.

          See: workspace/_global/trunk-discipline-tech-strategy-2026-05-19.md (architect spec)
               workspace/_global/v0.24.1-layer-a-regex-fix-2026-05-19.md (override-regex
                                                                          trailer-restriction
                                                                          tightening)
               commands/release.md Step 6/7/8/9 (Layer B operator-side flow)
               hooks/version-gate.py invariant 4 (operator-side ceiling)
          EOF
          exit 1

      - name: Publish to npm
        # Trusted Publishing (OIDC): npm CLI detects the GitHub Actions OIDC
        # context via the `id-token: write` permission set at the job level
        # and authenticates against npm without a long-lived token. The
        # NPM_TOKEN repo secret is retained as a fallback during the migration
        # cutover; once a Trusted Publishing publish succeeds, that secret can
        # be deleted. Configure the trusted publisher on npmjs.com →
        # @tapintomymind/tap-agents → Settings → Trusted Publishers.
        run: npm publish --access public --provenance

      - name: Extract CHANGELOG entry for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Capture the section between `## [<version>]` and the next `## [` heading.
          BODY=$(awk -v v="$VERSION" '
            $0 ~ "^## \\["v"\\]" { found=1; print; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$BODY" ]; then
            echo "::warning::No CHANGELOG section found for $VERSION."
            BODY="See CHANGELOG.md for details."
          fi
          # Escape for GitHub Actions multiline output
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
