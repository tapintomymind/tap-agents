name: version-check

# Gate 3 of protocols/versioning-protocol.md.
# Runs on every PR targeting main. Validates that package.json + CHANGELOG.md +
# .claude-plugin/plugin.json + .claude-plugin/marketplace.json are aligned and that
# the proposed version bump meets the severity floor implied by the PR diff.
#
# This is a REQUIRED check — protect main in branch settings to enforce.

on:
  pull_request:
    branches: [main]
    paths:
      # Only fires when the version surface is touched. PRs that don't touch these
      # paths don't need to bump versions and aren't gated.
      - "agents/**"
      - "commands/**"
      - "protocols/**"
      - "templates/**"
      - "hooks/**"
      - "scripts/**"
      - "package.json"
      - "CHANGELOG.md"
      - ".claude-plugin/**"
      - "tsconfig.json"
      - ".github/workflows/version-check.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # Fetch enough history to diff against main and to resolve tags.
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          git fetch origin main --depth=200 --tags

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run version-check
        run: npx tsx scripts/build-src/version-check.ts --base origin/main

      - name: Run CHANGELOG format test (CR-13 / NF-9)
        # Asserts every "## [X.Y.Z] — YYYY-MM-DD ..." heading matches the
        # canonical regex that the consumer-side awk extractor in
        # tapagents-app/.github/workflows/adopt-tap-agents.yml expects.
        # If a heading drifts, the consumer silently emits an empty CHANGELOG
        # section in adoption PRs — this test catches drift before merge.
        # Phase 2b deliverable per tapagents-app PR #28 design.
        run: npm run test:changelog-format
