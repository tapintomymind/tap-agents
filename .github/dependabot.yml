# Dependabot — npm + GitHub Actions update surveillance.
#
# Pattern follows agent-dashboard/.github/dependabot.yml (2026-05-07 model):
# enable Dependabot WITH ignore-major-versions seed BEFORE first run to avoid
# the "13-PR flood + breaking change storm" that occurs on first activation
# of unmanaged projects. Per the tap-agents framework operator's enable-with-
# ignore pattern (memory note 2026-05-07).
#
# tap-agents has a much smaller dep surface than agent-dashboard — only three
# devDependencies: typescript, tsx, @types/node. None require migration rounds
# in the near term, but locking major bumps on @types/node (lockstep with
# Node runtime) and typescript (TS 6 has deprecated-API breakage) is prudent.
#
# Production deps: zero. The package is text-only (markdown + generated JS).

version: 2
updates:
  # ─── npm devDependencies ────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"

    # Lock major-version bumps on lockstep-with-runtime deps.
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

    # Group patch + minor updates into one PR/week per dep-class.
    groups:
      dev-deps:
        applies-to: "version-updates"
        dependency-type: "development"
        update-types:
          - "patch"
          - "minor"

  # ─── GitHub Actions runner version updates ──────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"

    # Lock majors on actions where v→vN+1 contracts have historically shifted.
    ignore:
      - dependency-name: "actions/checkout"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/setup-node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "softprops/action-gh-release"
        update-types: ["version-update:semver-major"]

    groups:
      gh-actions-minor:
        applies-to: "version-updates"
        update-types:
          - "patch"
          - "minor"
